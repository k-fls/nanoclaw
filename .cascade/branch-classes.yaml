# Branch class registry for cascade.
# Patterns are ordered; first match wins (also determines topological order
# for ownership derivation: earlier entries win over later ones, so a commit
# present in both a parent and a descendant long-lived branch is attributed
# to the parent).
# See cascade/docs/artifacts.md and cascade/docs/branch-model.md.

classes:
  - name: upstream
    pattern: '^upstream/.+$'
    read_only: true

  # Transitional: repo default is still `main`. §2 forbids a separate main,
  # so the pattern accepts both until a real rename lands in a later phase.
  # See cascade/docs/phase-0.md § Transition.
  - name: core
    pattern: '^(core|main)$'
    base: upstream/main
    version_source: upstream/main

  # Modules and channels are carriers bound to core — they travel with
  # core's version and do not get their own `<branch>/A.B.C.D` tags. Skills
  # remain versioned because they're first-class independent artifacts.
  # See cascade/docs/phase-2-discrepancies.md § "Modules and channels carry
  # no versions of their own".
  - name: module
    pattern: '^module/[^/]+$'
    base: core
    version_source: core
    not_versioned: true

  # Legacy module branches that predate the `module/*` naming. Same semantics
  # as `module`, kept as a separate class so the canonical pattern stays
  # clean and so this list is easy to retire once the branches are renamed.
  - name: module-legacy
    pattern: '^feature/((commands|crypto|interaction)-module|claude-updater)$'
    base: core
    version_source: core
    not_versioned: true

  - name: channel
    pattern: '^channel/[^/]+$'
    base: core
    version_source: core
    co_merges: ['upstream/skill/*']
    not_versioned: true

  - name: skill
    pattern: '^skill/[^/]+$'
    base: core
    version_source: core

  - name: skill-adapter
    pattern: '^skill/([^/]+)/[^/]+$'
    base_from_match: 'skill/$1'
    version_source_from_match: 'skill/$1'

  - name: module-adapter
    pattern: '^module/([^/]+)/[^/]+$'
    base_from_match: 'module/$1'
    version_source_from_match: 'module/$1'

  - name: edition
    pattern: '^edition/[^/]+$'
    base: core
    version_source: declared  # via .cascade/parent_branch on the branch

  - name: deploy
    pattern: '^deploy/[^/]+$'
    base: 'edition/*'
    version_source_from_ancestry: 'edition/*'

  # Fallback — anything not matched above is ephemeral.
  - name: ephemeral
    pattern: '.*'
    fallback: true
    not_versioned: true
